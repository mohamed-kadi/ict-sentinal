server:
  port: ${PORT:8080}

spring:
  application:
    name: ictcrakr-backend
  datasource:
    url: ${ICTCRAKR_DB_URL:jdbc:h2:file:./data/ictcrakr;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${ICTCRAKR_DB_USERNAME:sa}
    password: ${ICTCRAKR_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console

ictcrakr:
  frontend-origin: ${ICTCRAKR_FRONTEND_ORIGIN:http://localhost:3000}
  analysis:
    min-sample-size: 5
    min-win-rate: 0.45
    strong-win-rate: 0.60
    strong-size-multiplier: 1.5
    neutral-size-multiplier: 1.0
